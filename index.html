<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Parts Background Remover</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #f0f0ff;
            border-color: #764ba2;
        }
        input[type="file"] { display: none; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .preview-area {
            display: none;
            margin-top: 30px;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .preview-box {
            text-align: center;
        }
        .preview-box h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .preview-box img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin: 10px 0;
            display: none;
        }
        @media (max-width: 768px) {
            .preview-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Car Parts Background Remover</h1>
        <p class="subtitle">上传汽车配件图片，自动去除背景</p>
        
        <div class="upload-area" id="uploadArea">
            <p style="font-size: 48px; margin-bottom: 10px;">📸</p>
            <p style="color: #667eea; font-size: 18px; margin-bottom: 10px;">点击或拖拽图片到这里</p>
            <p style="color: #999; font-size: 14px;">支持 JPG, PNG 格式</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #667eea;">正在处理图片...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="preview-area" id="previewArea">
            <div class="preview-grid">
                <div class="preview-box">
                    <h3>原图</h3>
                    <img id="originalImg" alt="原图">
                </div>
                <div class="preview-box">
                    <h3>去背景后</h3>
                    <img id="resultImg" alt="处理后">
                </div>
            </div>
            <div style="text-align: center;">
                <button class="btn" id="downloadBtn">下载图片</button>
                <button class="btn" id="resetBtn" style="margin-left: 10px;">重新上传</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
